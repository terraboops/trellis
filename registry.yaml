agents:
- name: ideation
  description: Research analyst that validates ideas through competitive analysis
    and feasibility assessment
  model: claude-opus-4-6
  max_turns: 50
  max_budget_usd: 0.0
  status: active
  tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
  - WebSearch
  - WebFetch
  - Agent
  phase: ideation
  max_concurrent: 1
  permission_mode: bypassPermissions
  thinking:
    type: adaptive
  setting_sources:
  - project
  claude_home: trellis/agents/ideation/.claude
- name: implementation
  description: Software engineer that builds MVPs from validated specs
  model: claude-sonnet-4-6
  max_turns: 200
  max_budget_usd: 0
  status: active
  tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
  - Agent
  phase: implementation
  max_concurrent: 1
  permission_mode: bypassPermissions
  thinking:
    type: adaptive
  setting_sources:
  - project
  claude_home: trellis/agents/implementation/.claude
- name: validation
  description: QA engineer that tests implementations against specs
  model: claude-sonnet-4-6
  max_turns: 30
  max_budget_usd: 0
  status: active
  tools:
  - Read
  - Bash
  - Glob
  - Grep
  - WebFetch
  phase: validation
  max_concurrent: 1
  permission_mode: bypassPermissions
  thinking:
    type: adaptive
  setting_sources:
  - project
  claude_home: trellis/agents/validation/.claude
- name: release
  description: Release engineer that deploys software and creates launch materials
  model: claude-sonnet-4-6
  max_turns: 50
  max_budget_usd: 0
  status: active
  tools:
  - Read
  - Write
  - Edit
  - Bash
  - WebSearch
  phase: release
  max_concurrent: 1
  permission_mode: bypassPermissions
  thinking:
    type: adaptive
  setting_sources:
  - project
  claude_home: trellis/agents/release/.claude
- name: competitive-watcher
  description: Monitors competitive landscape for active ideas
  model: claude-haiku-4-5
  max_turns: 10
  max_budget_usd: 0
  status: active
  tools:
  - Read
  - WebSearch
  - WebFetch
  cadence: 0 */6 * * *
  max_concurrent: 1
  permission_mode: bypassPermissions
- name: research-watcher
  description: Continuous research for active ideas
  model: claude-opus-4-6
  max_turns: 50
  max_budget_usd: 0.0
  status: active
  tools:
  - Read
  - WebSearch
  - WebFetch
  phase: research
  cadence: 0 */4 * * *
  max_concurrent: 1
  permission_mode: bypassPermissions
  thinking:
    type: adaptive
- name: prioritizer
  description: Scores idea priority based on impact, values alignment, and probability
    of success
  model: claude-sonnet-4-6
  max_turns: 10
  max_budget_usd: 0
  status: active
  tools:
  - Read
  - WebSearch
  max_concurrent: 1
  permission_mode: bypassPermissions
